name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.1"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify version matches tag
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "${APP_VERSION%%+*}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pubspec version ${APP_VERSION}."
            exit 1
          fi

          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NAME=${APP_VERSION%%+*}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${APP_VERSION#*+}" >> "$GITHUB_ENV"

      - name: Prepare signing files
        env:
          ANDROID_SIGNING_CERT_PEM: ${{ secrets.ANDROID_SIGNING_CERT_PEM }}
          ANDROID_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.ANDROID_SIGNING_PRIVATE_KEY_PEM }}
          ANDROID_KEYSTORE_HEX: ${{ secrets.ANDROID_KEYSTORE_HEX }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_SIGNING_CERT_PEM" ] && [ -n "$ANDROID_SIGNING_PRIVATE_KEY_PEM" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            printf '%s\n' "$ANDROID_SIGNING_CERT_PEM" > android/release-cert.pem
            printf '%s\n' "$ANDROID_SIGNING_PRIVATE_KEY_PEM" > android/release-key.pem
            openssl pkcs12 -export \
              -name "$ANDROID_KEY_ALIAS" \
              -in android/release-cert.pem \
              -inkey android/release-key.pem \
              -out android/upload-keystore.p12 \
              -passout "pass:$ANDROID_KEYSTORE_PASSWORD"
            keytool -importkeystore \
              -noprompt \
              -srckeystore android/upload-keystore.p12 \
              -srcstoretype PKCS12 \
              -srcstorepass "$ANDROID_KEYSTORE_PASSWORD" \
              -srcalias "$ANDROID_KEY_ALIAS" \
              -destkeystore android/upload-keystore.jks \
              -deststoretype JKS \
              -deststorepass "$ANDROID_KEYSTORE_PASSWORD" \
              -destkeypass "$ANDROID_KEY_PASSWORD" \
              -destalias "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              "$ANDROID_KEY_PASSWORD" > android/key.properties
          elif [ -n "$ANDROID_KEYSTORE_HEX" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            printf '%s' "$ANDROID_KEYSTORE_HEX" | tr -d '\r\n' | xxd -r -p > android/upload-keystore.jks
            printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              "$ANDROID_KEY_PASSWORD" > android/key.properties
          elif [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n' | openssl base64 -d -A -out android/upload-keystore.jks
            printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              "$ANDROID_KEY_PASSWORD" > android/key.properties
          else
            echo "Skipping CI keystore setup."
          fi

      - name: Report signing mode
        run: |
          if [ -f android/key.properties ]; then
            echo "Using repository secrets for Android release signing."
          else
            echo "No Android signing secrets configured. Falling back to debug signing for this GitHub release."
          fi

      - name: Build signed APK
        run: flutter build apk --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Build signed app bundle
        run: flutter build appbundle --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Create checksums
        run: |
          sha256sum build/app/outputs/flutter-apk/app-release.apk > build/app/outputs/flutter-apk/app-release.apk.sha256
          sha256sum build/app/outputs/bundle/release/app-release.aab > build/app/outputs/bundle/release/app-release.aab.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha256
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/bundle/release/app-release.aab.sha256
